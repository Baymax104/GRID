_target_: lightning.pytorch.trainer.Trainer

default_root_dir: ${paths.output_dir}
min_steps: 1
# remember that if you use gradient accumulation, this number will only be updated after each accumulation
# so for 40000 steps with gradient accumulation of 2, you will have 80000 batches
max_steps: !!int 80000
max_epochs: 10
accelerator: gpu
devices: -1
num_nodes: 1
# mixed precision for extra speed-up
precision: bf16-mixed
log_every_n_steps: 2500
# perform a validation loop every N training epochs
val_check_interval: 5000

# set True to ensure deterministic results
# makes training slower but gives more reproducibility than just setting seeds
deterministic: False
accumulate_grad_batches: 1
# If you want to pass parameters like the static_graph flag,
# comment this one out and uncomment the one below.
strategy: ddp

# This step can provide a 5% speedup for DDP if your model
# works well with static graph. Uncomment the code below to enable it.
# strategy:
#   _target_: lightning.pytorch.strategies.DDPStrategy
#   static_graph: True

sync_batchnorm: True
